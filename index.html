<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Coach — Beginner Gym Tracker</title>
  <meta name="theme-color" content="#7B5EA7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Coach" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="purple">

  <!-- Phone frame: status bar + scrollable screen + fixed bottom nav -->
  <div id="phone">

    <div class="statusbar">
      <span id="sb-time">9:41</span>
      <span class="sb-right">
        <span class="sb-dot">●●●</span>
        <span>Wi-Fi</span>
        <span>100%</span>
      </span>
    </div>

    <!-- Independent scroll area; screens render here -->
    <main id="screen" role="main"></main>

    <!-- Fixed bottom navigation (same on every screen) -->
    <nav id="nav" aria-label="Primary"></nav>

    <!-- Overlay layer: sheets, modals, full-screen overlays, menus -->
    <div id="layer" aria-live="polite"></div>

    <!-- Onboarding mounts here when needed -->
    <div id="onb-host"></div>

    <!-- Toast / undo -->
    <div id="toast" role="status"></div>
  </div>

  <!-- Data + supporting modules first, then the app controller -->
  <script src="data/equipment.js"></script>
  <script src="data/badges.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/avatars.js"></script>
  <script src="js/muscleMap.js"></script>
  <script src="js/badgeArt.js"></script>
  <script src="app.js"></script>
</body>
</html>
